<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颜东宁 | Dongning Yan</title>
    <meta
      name="description"
      content="Bilingual personal website for Dongning Yan."
    />
    <meta name="theme-color" content="#072f49" />
    <meta property="og:title" content="颜东宁 | Dongning Yan" />
    <meta property="og:description" content="Bilingual personal website for Dongning Yan." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <a class="brand" href="#profile">
          <span class="brand-name">颜东宁</span>
          <span class="brand-subtitle" id="brandSubtitle"></span>
        </a>

        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#profile" id="navProfile"></a>
          <a href="#internships" id="navInternships"></a>
          <a href="#hobbies" id="navHobbies"></a>
          <a href="#contact" id="navContact"></a>
        </nav>

        <div class="lang-switch" aria-label="Language toggle">
          <button class="lang-button is-active" type="button" data-set-lang="zh">中</button>
          <button class="lang-button" type="button" data-set-lang="en">EN</button>
        </div>
      </header>

      <main>
        <section class="hero" id="profile">
          <div class="hero-shell">
            <div class="hero-copy">
              <h1 class="hero-title" id="heroTitle"></h1>
              <p class="hero-subtitle" id="heroSubtitle"></p>
            </div>

            <div class="hero-photo-wrap">
              <img class="hero-photo" src="./1.jpg" alt="Portrait of Dongning Yan" />
            </div>
          </div>

          <div class="profile-layout">
            <div class="section-head">
              <span>01</span>
              <h2 id="profileTitle"></h2>
            </div>

            <div class="profile-content">
              <div class="education-block">
                <p class="profile-label" id="dualDegreeLabel"></p>

                <article class="school-item">
                  <img src="./深圳大学校徽.jpg" alt="Shenzhen University logo" />
                  <div>
                    <h3>深圳大学</h3>
                    <p id="szuDegree"></p>
                  </div>
                </article>

                <article class="school-item">
                  <img src="./Audencia校徽.jpg" alt="Audencia logo" />
                  <div>
                    <h3>Audencia Business School</h3>
                    <p id="audenciaDegree"></p>
                  </div>
                </article>

                <div class="plain-text-group">
                  <p class="group-label" id="coreCoursesLabel"></p>
                  <p id="coreCoursesText"></p>
                </div>

                <div class="plain-text-group">
                  <p class="group-label" id="exchangeLabel"></p>
                  <p id="exchangeText"></p>
                </div>

                <div class="plain-text-group">
                  <p class="group-label" id="ieltsLabel"></p>
                  <p id="ieltsText"></p>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section" id="internships">
          <div class="section-head">
            <span>02</span>
            <h2 id="internshipsTitle"></h2>
          </div>

          <div class="internship-list" id="internshipList"></div>
        </section>

        <section class="section" id="hobbies">
          <div class="section-head">
            <span>03</span>
            <h2 id="hobbiesTitle"></h2>
          </div>

          <div class="hobbies-shell">
            <div class="hobbies-copy">
              <ul class="hobby-list" id="hobbyList"></ul>
            </div>

            <div class="hobby-gallery">
              <figure class="gallery-photo">
                <img src="./生活照2.jpg" alt="Basketball photo" />
              </figure>
              <figure class="gallery-photo">
                <img src="./生活照1.HEIC.png" alt="Golf photo" />
              </figure>
            </div>
          </div>
        </section>

        <section class="section section-contact" id="contact">
          <div class="section-head">
            <span>04</span>
            <h2 id="contactTitle"></h2>
          </div>

          <div class="contact-grid">
            <a class="contact-item" href="mailto:160423ydn@gmail.com">
              <span id="contactEmailLabel"></span>
              <strong>160423ydn@gmail.com</strong>
            </a>
            <a class="contact-item" href="tel:+8617665011604">
              <span id="contactPhoneLabel"></span>
              <strong>+86 17665011604</strong>
            </a>
            <div class="contact-item">
              <span id="contactLocationLabel"></span>
              <strong id="contactLocationValue"></strong>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
