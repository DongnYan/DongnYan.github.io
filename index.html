<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颜东宁 | Dongning (Don) Yan</title>
    <meta name="description" content="Bilingual personal website for Dongning (Don) Yan." />
    <meta name="theme-color" content="#072f49" />
    <meta property="og:title" content="颜东宁 | Dongning (Don) Yan" />
    <meta property="og:description" content="Bilingual personal website for Dongning (Don) Yan." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <button
          class="mobile-menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="mobileMenu"
          aria-label="Open navigation"
        >
          <span></span>
          <span></span>
        </button>

        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#profile" id="navProfile" data-nav="profile" data-nav-link></a>
          <a href="#internships" id="navInternships" data-nav="internships" data-nav-link></a>
          <a href="#hobbies" id="navHobbies" data-nav="hobbies" data-nav-link></a>
          <a href="#contact" id="navContact" data-nav="contact" data-nav-link></a>
        </nav>

        <div class="lang-switch" aria-label="Language toggle">
          <button class="lang-button is-active" type="button" data-set-lang="zh">中</button>
          <button class="lang-button" type="button" data-set-lang="en">EN</button>
        </div>
      </header>

      <div class="mobile-menu" id="mobileMenu" hidden>
        <button class="mobile-menu-backdrop" type="button" data-close-menu aria-label="Close menu"></button>
        <div class="mobile-menu-panel">
          <div class="mobile-menu-head">
            <span class="mobile-menu-label" id="mobileMenuLabel">Menu</span>
            <button class="mobile-menu-close" type="button" data-close-menu aria-label="Close navigation">
              <span></span>
              <span></span>
            </button>
          </div>

          <nav class="mobile-nav-links" aria-label="Mobile navigation">
            <a href="#profile" data-nav="profile" data-nav-link></a>
            <a href="#internships" data-nav="internships" data-nav-link></a>
            <a href="#hobbies" data-nav="hobbies" data-nav-link></a>
            <a href="#contact" data-nav="contact" data-nav-link></a>
          </nav>
        </div>
      </div>

      <main>
        <section class="intro" id="profile" data-section="profile">
          <div class="intro-panel">
            <figure class="intro-media">
              <img class="hero-photo" src="./1.jpg" alt="Portrait of Dongning (Don) Yan" />
            </figure>

            <div class="intro-main">
              <div class="identity-block">
                <h1 class="name-cn" id="heroTitle"></h1>
                <h1 class="name-en" id="heroSubtitle"></h1>
              </div>

              <div class="intro-grid">
                <div class="intro-column">
                  <p class="inline-label" id="dualDegreeLabel"></p>

                  <article class="school-row">
                    <div class="school-mark">
                      <img src="./深圳大学校徽.jpg" alt="Shenzhen University logo" />
                    </div>
                    <div class="school-copy">
                      <h2 id="szuName"></h2>
                      <p id="szuDegree"></p>
                    </div>
                    <p class="school-time" id="szuTime"></p>
                  </article>

                  <article class="school-row">
                    <div class="school-mark">
                      <img src="./Audencia校徽.jpg" alt="Audencia logo" />
                    </div>
                    <div class="school-copy">
                      <h2 id="audenciaName"></h2>
                      <p id="audenciaDegree"></p>
                    </div>
                    <p class="school-time" id="audenciaTime"></p>
                  </article>

                  <p class="inline-label" id="exchangeLabel"></p>

                  <article class="school-row school-row-joint">
                    <div class="school-mark school-mark-dual">
                      <img src="./Audencia校徽.jpg" alt="Audencia logo" />
                      <img src="./Centrale Nantes校徽.jpg" alt="Centrale Nantes logo" />
                    </div>
                    <div class="school-copy">
                      <h2 id="exchangeSchools"></h2>
                      <p id="exchangeProgram"></p>
                    </div>
                    <p class="school-time" id="exchangeTime"></p>
                  </article>

                  <div class="text-row">
                    <p class="inline-label" id="skillsLabel"></p>
                    <div class="text-stack">
                      <p id="programmingSkills"></p>
                      <p id="toolSkills"></p>
                      <p id="languageSkills"></p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="content-section" id="internships" data-section="internships">
          <div class="internship-list" id="internshipList"></div>
        </section>

        <section class="content-section" id="hobbies" data-section="hobbies">
          <div class="hobbies-shell">
            <ul class="hobby-list" id="hobbyList"></ul>

            <div class="hobby-gallery">
              <figure class="gallery-photo">
                <img src="./生活照2.jpg" alt="Basketball photo" />
              </figure>
              <figure class="gallery-photo">
                <img src="./生活照1.HEIC.png" alt="Golf photo" />
              </figure>
              <figure class="gallery-photo gallery-photo-card">
                <img src="./视觉中国摄影师.JPG" alt="Visual China photographer card" />
              </figure>
            </div>
          </div>
        </section>

        <section class="content-section contact-section" id="contact" data-section="contact">
          <div class="contact-grid">
            <a class="contact-item" href="mailto:160423ydn@gmail.com">
              <span id="contactEmailLabel"></span>
              <strong>160423ydn@gmail.com</strong>
            </a>
            <a class="contact-item" href="tel:+8617665011604">
              <span id="contactPhoneLabel"></span>
              <strong>+86 17665011604</strong>
            </a>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
