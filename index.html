<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颜东宁 | Dongning Yan</title>
    <meta
      name="description"
      content="Bilingual personal website for Dongning Yan. White-dominant editorial layout with selected experience, education, skills, and hobbies."
    />
    <meta name="theme-color" content="#ffffff" />
    <meta property="og:title" content="颜东宁 | Dongning Yan" />
    <meta
      property="og:description"
      content="Bilingual personal website with a clean editorial layout and a portrait-led hero."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-frame">
      <header class="site-header">
        <a class="brand" href="#top" aria-label="Go to top">
          <span class="brand-name">颜东宁</span>
          <span class="brand-subtitle" id="brandSubtitle"></span>
        </a>

        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#profile" id="navProfile"></a>
          <a href="#experience" id="navExperience"></a>
          <a href="#education" id="navEducation"></a>
          <a href="#life" id="navLife"></a>
          <a href="#contact" id="navContact"></a>
        </nav>

        <div class="lang-switch" aria-label="Language toggle">
          <button class="lang-button is-active" type="button" data-set-lang="zh">中</button>
          <button class="lang-button" type="button" data-set-lang="en">EN</button>
        </div>
      </header>

      <main id="top">
        <section class="hero">
          <div class="hero-shell">
            <div class="hero-copy">
              <p class="hero-kicker hero-item" id="heroKicker"></p>
              <h1 class="hero-title hero-item" id="heroTitle"></h1>
              <p class="hero-intro hero-item" id="heroIntro"></p>
              <p class="hero-summary hero-item" id="heroSummary"></p>

              <div class="hero-detail-grid hero-item">
                <div class="detail-line">
                  <span id="detailLocationLabel"></span>
                  <strong id="detailLocation"></strong>
                </div>
                <div class="detail-line">
                  <span id="detailEmailLabel"></span>
                  <strong id="detailEmail"></strong>
                </div>
                <div class="detail-line">
                  <span id="detailPhoneLabel"></span>
                  <strong id="detailPhone"></strong>
                </div>
              </div>

              <div class="hero-actions hero-item">
                <a class="button button-primary" href="#experience" id="primaryCta"></a>
                <a class="button button-secondary" href="#contact" id="secondaryCta"></a>
              </div>
            </div>

            <div class="hero-media hero-item">
              <figure class="portrait-block">
                <img
                  class="hero-portrait"
                  src="./1.jpg"
                  alt="Portrait of Dongning Yan"
                />
                <figcaption id="portraitCaption"></figcaption>
              </figure>
            </div>
          </div>
        </section>

        <section class="section" id="profile">
          <div class="section-marker">
            <span>01</span>
            <p id="profileEyebrow"></p>
          </div>
          <div class="section-shell">
            <h2 class="section-title" id="profileTitle"></h2>
            <div class="section-content">
              <p class="section-lead" id="profileBody"></p>
              <ul class="signal-list" id="focusList"></ul>
            </div>
          </div>
        </section>

        <section class="section" id="experience">
          <div class="section-marker">
            <span>02</span>
            <p id="experienceEyebrow"></p>
          </div>
          <div class="section-shell">
            <h2 class="section-title" id="experienceTitle"></h2>
            <div class="section-content">
              <div class="experience-list" id="experienceList"></div>
            </div>
          </div>
        </section>

        <section class="section" id="education">
          <div class="section-marker">
            <span>03</span>
            <p id="educationEyebrow"></p>
          </div>
          <div class="section-shell">
            <h2 class="section-title" id="educationTitle"></h2>
            <div class="section-content section-content-split">
              <div>
                <p class="section-lead" id="educationBody"></p>
                <div class="education-list" id="educationList"></div>
              </div>
              <div class="skill-list" id="skillsList"></div>
            </div>
          </div>
        </section>

        <section class="section" id="life">
          <div class="section-marker">
            <span>04</span>
            <p id="lifeEyebrow"></p>
          </div>
          <div class="section-shell life-shell">
            <div>
              <h2 class="section-title" id="lifeTitle"></h2>
              <p class="section-lead" id="lifeBody"></p>
              <ul class="hobby-list" id="hobbyList"></ul>
            </div>

            <div class="life-gallery">
              <figure class="life-photo-main">
                <img src="./1.jpg" alt="Portrait of Dongning Yan" />
                <figcaption id="lifeCaption"></figcaption>
              </figure>

              <div class="life-photo-placeholder">
                <span id="placeholderOneTag"></span>
                <strong id="placeholderOneTitle"></strong>
              </div>

              <div class="life-photo-placeholder">
                <span id="placeholderTwoTag"></span>
                <strong id="placeholderTwoTitle"></strong>
              </div>
            </div>
          </div>
        </section>

        <section class="section contact-section" id="contact">
          <div class="section-marker">
            <span>05</span>
            <p id="contactEyebrow"></p>
          </div>
          <div class="section-shell contact-shell">
            <h2 class="section-title" id="contactTitle"></h2>
            <div class="section-content">
              <p class="section-lead" id="contactBody"></p>

              <div class="contact-lines">
                <a class="contact-line" href="mailto:160423ydn@gmail.com">
                  <span id="contactEmailLabel"></span>
                  <strong>160423ydn@gmail.com</strong>
                </a>
                <a class="contact-line" href="tel:+8617665011604">
                  <span id="contactPhoneLabel"></span>
                  <strong>+86 17665011604</strong>
                </a>
                <div class="contact-line">
                  <span id="contactLocationLabel"></span>
                  <strong>Shenzhen / Guangzhou</strong>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
