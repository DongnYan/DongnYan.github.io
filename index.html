<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>颜东宁 | Dongning Yan</title>
    <meta name="description" content="Bilingual personal website for Dongning Yan." />
    <meta name="theme-color" content="#072f49" />
    <meta property="og:title" content="颜东宁 | Dongning Yan" />
    <meta property="og:description" content="Bilingual personal website for Dongning Yan." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="#profile" id="navProfile"></a>
          <a href="#internships" id="navInternships"></a>
          <a href="#hobbies" id="navHobbies"></a>
          <a href="#contact" id="navContact"></a>
        </nav>

        <div class="lang-switch" aria-label="Language toggle">
          <button class="lang-button is-active" type="button" data-set-lang="zh">中</button>
          <button class="lang-button" type="button" data-set-lang="en">EN</button>
        </div>
      </header>

      <main>
        <section class="intro" id="profile" data-section="profile">
          <div class="intro-panel">
            <figure class="intro-media">
              <img class="hero-photo" src="./1.jpg" alt="Portrait of Dongning Yan" />
            </figure>

            <div class="intro-main">
              <div class="identity-block">
                <h1 class="name-cn" id="heroTitle"></h1>
                <p class="name-en" id="heroSubtitle"></p>
              </div>

              <div class="intro-grid">
                <div class="intro-column">
                  <p class="inline-label" id="dualDegreeLabel"></p>

                  <article class="school-row">
                    <img src="./深圳大学校徽.jpg" alt="Shenzhen University logo" />
                    <div>
                      <h2>深圳大学</h2>
                      <p id="szuDegree"></p>
                    </div>
                  </article>

                  <article class="school-row">
                    <img src="./Audencia校徽.jpg" alt="Audencia logo" />
                    <div>
                      <h2>Audencia Business School</h2>
                      <p id="audenciaDegree"></p>
                    </div>
                  </article>
                </div>

                <div class="intro-column intro-notes">
                  <div class="text-row">
                    <p class="inline-label" id="coreCoursesLabel"></p>
                    <p id="coreCoursesText"></p>
                  </div>

                  <div class="text-row">
                    <p class="inline-label" id="exchangeLabel"></p>
                    <p id="exchangeText"></p>
                  </div>

                  <div class="text-row">
                    <p class="inline-label" id="ieltsLabel"></p>
                    <p id="ieltsText"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="content-section" id="internships" data-section="internships">
          <div class="internship-list" id="internshipList"></div>
        </section>

        <section class="content-section" id="hobbies" data-section="hobbies">
          <div class="hobbies-shell">
            <ul class="hobby-list" id="hobbyList"></ul>

            <div class="hobby-gallery">
              <figure class="gallery-photo">
                <img src="./生活照2.jpg" alt="Basketball photo" />
              </figure>
              <figure class="gallery-photo">
                <img src="./生活照1.HEIC.png" alt="Golf photo" />
              </figure>
            </div>
          </div>
        </section>

        <section class="content-section contact-section" id="contact" data-section="contact">
          <div class="contact-grid">
            <a class="contact-item" href="mailto:160423ydn@gmail.com">
              <span id="contactEmailLabel"></span>
              <strong>160423ydn@gmail.com</strong>
            </a>
            <a class="contact-item" href="tel:+8617665011604">
              <span id="contactPhoneLabel"></span>
              <strong>+86 17665011604</strong>
            </a>
            <div class="contact-item">
              <span id="contactLocationLabel"></span>
              <strong id="contactLocationValue"></strong>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
